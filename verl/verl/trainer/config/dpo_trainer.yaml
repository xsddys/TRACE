data:
  train_batch_size: 32
  micro_batch_size_per_gpu: 1
  train_files: ~/data/multiturn_dpo/train.parquet
  val_files: ~/data/multiturn_dpo/test.parquet
  messages_key: messages
  prompt_key: prompt
  current_prompt_key: null
  chosen_key: chosen
  rejected_key: rejected
  max_prompt_length: 2048
  max_response_length: 1024
  max_length: 3072
  prompt_truncation: left
  response_truncation: right
  truncation: truncate
  append_eos: true
model:
  partial_pretrain: Qwen/Qwen2.5-7B-Instruct
  ref_model_path: null
  fsdp_config:
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  external_lib: null
  enable_gradient_checkpointing: True
  trust_remote_code: False
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: False
optim:
  lr: 5e-7
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.03
  clip_grad: 1.0
  lr_scheduler: cosine
dpo:
  beta: 0.1
  label_smoothing: 0.0
  reference_free: false
  average_log_prob: false
trainer:
  default_local_dir: ./outputs/dpo_model
  default_hdfs_dir: null
  project_name: multiturn-dpo
  experiment_name: test
  total_epochs: 1
  total_training_steps: null
  logger: ['console']
  seed: 1
