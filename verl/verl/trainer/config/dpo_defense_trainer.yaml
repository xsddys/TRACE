data:
  dataset_cls: defense_dpo
  train_batch_size: 164
  micro_batch_size_per_gpu: 2
  num_workers: 0
  val_num_workers: 0
  train_files: ./matric-rollout/DPO_defense/datasets/all_pairs/train.jsonl
  val_files: ./matric-rollout/DPO_defense/datasets/all_pairs/val.jsonl
  prompt_key: prompt
  chosen_key: chosen
  rejected_key: rejected
  prompt_text_key: prompt_text
  chosen_text_key: chosen_text
  rejected_text_key: rejected_text
  max_prompt_length: 5120
  max_response_length: 1024
  max_length: 6144
  prompt_truncation: left
  response_truncation: right
  truncation: truncate
  append_eos: true
helpful_data:
  enabled: false
  dataset_cls: defense_sft
  train_files: null
  val_files: null
  train_batch_size: 64
  micro_batch_size_per_gpu: 2
  num_workers: 0
  val_num_workers: 0
  prompt_key: prompt
  response_key: response
  prompt_text_key: prompt_text
  response_text_key: response_text
  max_prompt_length: 4096
  max_response_length: 1024
  max_length: 5120
  prompt_truncation: left
  response_truncation: right
  truncation: truncate
  append_eos: true
model:
  partial_pretrain: ./models/Qwen2.5-7B-Instruct
  ref_model_path: null
  fsdp_config:
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  external_lib: null
  enable_gradient_checkpointing: True
  trust_remote_code: False
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: all-linear
  use_liger: False
optim:
  lr: 3e-6
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.03
  max_grad_norm: 1.0
  lr_scheduler: cosine
dpo:
  beta: 0.1
  loss_type: sigmoid
  label_smoothing: 0.0
  reference_free: false
  average_log_prob: true
joint:
  sft_lambda: 0.3
trainer:
  default_local_dir: ./checkpoints/Defense
  default_hdfs_dir: null
  project_name: multiturn-defense-dpo
  experiment_name: qwen2.5-7b-defense-dpo
  total_epochs: 2
  total_training_steps: null
  evals_per_epoch: 2
  logger: ['console']
  seed: 1
